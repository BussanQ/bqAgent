<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>bqagent</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #080b12;
    --bg-soft: #0d1220;
    --panel: rgba(13, 18, 32, .72);
    --panel-strong: rgba(18, 25, 43, .88);
    --line: rgba(135, 160, 210, .18);
    --line-strong: rgba(128, 175, 255, .35);
    --text: #edf4ff;
    --text-soft: #a8b7cc;
    --text-muted: #70839f;
    --cyan: #54f0ff;
    --blue: #6a8dff;
    --green: #6df3b6;
    --violet: #a989ff;
    --danger: #ff6b8a;
    --shadow: 0 22px 70px rgba(0, 0, 0, .38);
    --radius: 18px;
    --maxw: 920px;
  }

  @media (prefers-color-scheme: light) {
    :root {
      color-scheme: light;
      --bg: #eef4fb;
      --bg-soft: #f8fbff;
      --panel: rgba(255, 255, 255, .78);
      --panel-strong: rgba(255, 255, 255, .94);
      --line: rgba(70, 94, 130, .18);
      --line-strong: rgba(43, 113, 204, .32);
      --text: #111827;
      --text-soft: #4b5f79;
      --text-muted: #7890aa;
      --shadow: 0 22px 70px rgba(50, 73, 104, .18);
    }
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    min-width: 320px;
    background:
      radial-gradient(circle at 10% -10%, rgba(84, 240, 255, .20), transparent 34%),
      radial-gradient(circle at 90% 8%, rgba(169, 137, 255, .22), transparent 30%),
      radial-gradient(circle at 50% 100%, rgba(109, 243, 182, .12), transparent 36%),
      linear-gradient(135deg, var(--bg), var(--bg-soft) 48%, var(--bg));
    color: var(--text);
    font: 15px/1.62 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
      "Segoe UI", "PingFang SC", "Microsoft YaHei", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image:
      linear-gradient(rgba(128, 175, 255, .08) 1px, transparent 1px),
      linear-gradient(90deg, rgba(128, 175, 255, .08) 1px, transparent 1px);
    background-size: 42px 42px;
    mask-image: linear-gradient(to bottom, rgba(0, 0, 0, .75), transparent 78%);
  }

  body::after {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
      linear-gradient(90deg, transparent, rgba(84, 240, 255, .05), transparent),
      linear-gradient(rgba(255, 255, 255, .03) 50%, transparent 50%);
    background-size: 100% 100%, 100% 4px;
    opacity: .42;
  }

  button, textarea { font: inherit; }
  button {
    cursor: pointer;
    border: 1px solid var(--line);
    color: var(--text);
    background: var(--panel);
    transition: transform .16s ease, border-color .16s ease, background .16s ease, box-shadow .16s ease;
  }
  button:hover {
    transform: translateY(-1px);
    border-color: var(--line-strong);
    box-shadow: 0 12px 32px rgba(84, 240, 255, .12);
  }
  button:disabled { opacity: .48; cursor: not-allowed; transform: none; box-shadow: none; }

  header {
    position: relative;
    z-index: 2;
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    padding: 14px clamp(14px, 3vw, 28px);
    border-bottom: 1px solid var(--line);
    background: rgba(8, 11, 18, .56);
    backdrop-filter: blur(18px);
  }

  .brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
  .mark {
    width: 36px;
    height: 36px;
    flex: 0 0 auto;
    border: 1px solid rgba(84, 240, 255, .55);
    border-radius: 12px;
    background:
      linear-gradient(135deg, rgba(84, 240, 255, .28), rgba(106, 141, 255, .18)),
      rgba(255, 255, 255, .05);
    box-shadow: inset 0 0 22px rgba(84, 240, 255, .16), 0 0 28px rgba(84, 240, 255, .18);
    position: relative;
  }
  .mark::before,
  .mark::after {
    content: "";
    position: absolute;
    border-radius: 999px;
  }
  .mark::before {
    inset: 9px;
    border: 2px solid rgba(237, 244, 255, .78);
    border-right-color: transparent;
  }
  .mark::after {
    width: 6px;
    height: 6px;
    right: 9px;
    bottom: 9px;
    background: var(--green);
    box-shadow: 0 0 16px var(--green);
  }
  .brand-text { min-width: 0; }
  .brand h1 {
    margin: 0;
    font-size: 16px;
    line-height: 1.2;
    letter-spacing: .4px;
    font-weight: 760;
  }
  .brand span {
    display: block;
    color: var(--text-muted);
    font-size: 12px;
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .actions { display: flex; align-items: center; gap: 10px; }
  .status {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 7px 10px;
    color: var(--text-soft);
    border: 1px solid var(--line);
    border-radius: 999px;
    background: rgba(255, 255, 255, .04);
    font-size: 12px;
    white-space: nowrap;
  }
  .status::before {
    content: "";
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 14px var(--green);
  }
  .ghost {
    height: 36px;
    padding: 0 13px;
    border-radius: 999px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(255, 255, 255, .06);
  }
  .ghost .plus { font-size: 18px; line-height: 1; color: var(--cyan); }

  main {
    position: relative;
    z-index: 1;
    flex: 1 1 auto;
    overflow-y: auto;
    scroll-behavior: smooth;
  }
  .thread {
    width: min(100%, var(--maxw));
    min-height: 100%;
    margin: 0 auto;
    padding: 34px clamp(14px, 3vw, 24px) 18px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .empty {
    width: min(100%, 680px);
    margin: clamp(42px, 12vh, 110px) auto 0;
    text-align: center;
    color: var(--text-soft);
  }
  .empty-mark {
    width: 78px;
    height: 78px;
    margin: 0 auto 22px;
    border-radius: 24px;
    border: 1px solid rgba(84, 240, 255, .46);
    background:
      radial-gradient(circle at 50% 48%, rgba(84, 240, 255, .34), transparent 32%),
      linear-gradient(135deg, rgba(84, 240, 255, .18), rgba(169, 137, 255, .16));
    box-shadow: inset 0 0 34px rgba(84, 240, 255, .10), 0 0 60px rgba(84, 240, 255, .18);
    position: relative;
  }
  .empty-mark::before,
  .empty-mark::after {
    content: "";
    position: absolute;
    inset: 16px;
    border-radius: 50%;
    border: 2px solid rgba(237, 244, 255, .66);
  }
  .empty-mark::after {
    inset: 29px 19px 19px 29px;
    border: 0;
    background: var(--green);
    box-shadow: 0 0 18px var(--green);
  }
  .empty .big {
    margin: 0 0 8px;
    color: var(--text);
    font-size: clamp(26px, 4vw, 38px);
    line-height: 1.18;
    font-weight: 780;
  }
  .empty p {
    margin: 0 auto;
    max-width: 520px;
    color: var(--text-soft);
  }
  .prompts {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 10px;
    margin-top: 24px;
  }
  .prompt {
    min-height: 48px;
    padding: 10px 12px;
    border-radius: 14px;
    text-align: left;
    color: var(--text-soft);
    background: rgba(255, 255, 255, .045);
    border: 1px solid var(--line);
  }
  .prompt:hover { color: var(--text); }

  .msg {
    display: flex;
    align-items: flex-start;
    gap: 11px;
  }
  .msg.user {
    flex-direction: row-reverse;
  }
  .avatar {
    width: 32px;
    height: 32px;
    flex: 0 0 32px;
    border-radius: 12px;
    border: 1px solid var(--line);
    display: grid;
    place-items: center;
    color: var(--text);
    font-size: 12px;
    font-weight: 760;
    background: rgba(255, 255, 255, .06);
    box-shadow: inset 0 0 18px rgba(255, 255, 255, .03);
  }
  .msg.assistant .avatar {
    color: #081018;
    background: linear-gradient(135deg, var(--cyan), var(--green));
    box-shadow: 0 0 24px rgba(84, 240, 255, .22);
  }
  .msg.user .avatar {
    background: linear-gradient(135deg, var(--blue), var(--violet));
    box-shadow: 0 0 24px rgba(169, 137, 255, .22);
  }
  .bubble {
    max-width: min(76%, 720px);
    padding: 13px 15px;
    border-radius: var(--radius);
    white-space: pre-wrap;
    word-wrap: break-word;
    overflow-wrap: anywhere;
    border: 1px solid var(--line);
    box-shadow: 0 14px 34px rgba(0, 0, 0, .16);
  }
  .msg.user .bubble {
    color: #ffffff;
    border-color: rgba(169, 137, 255, .38);
    border-top-right-radius: 6px;
    background:
      linear-gradient(135deg, rgba(106, 141, 255, .96), rgba(169, 137, 255, .86));
  }
  .msg.assistant .bubble {
    color: var(--text);
    border-top-left-radius: 6px;
    background: var(--panel-strong);
    backdrop-filter: blur(18px);
  }
  .bubble.error {
    color: var(--danger);
    background: rgba(255, 107, 138, .08);
    border-color: rgba(255, 107, 138, .55);
  }
  .bubble.rendered { white-space: normal; }
  .bubble.rendered p:first-child { margin-top: 0; }
  .bubble.rendered p:last-child { margin-bottom: 0; }
  .bubble pre {
    background: rgba(1, 6, 16, .72);
    border: 1px solid rgba(128, 175, 255, .20);
    border-radius: 14px;
    padding: 13px;
    overflow-x: auto;
    margin: 10px 0;
  }
  .bubble code {
    font-family: "SF Mono", "JetBrains Mono", Consolas, "Liberation Mono", monospace;
    font-size: 13px;
  }
  .bubble :not(pre) > code {
    background: rgba(128, 175, 255, .12);
    border: 1px solid rgba(128, 175, 255, .14);
    padding: 1px 6px;
    border-radius: 7px;
  }
  .bubble pre code { display: block; }
  .bubble h1, .bubble h2, .bubble h3, .bubble h4 { margin: 14px 0 7px; line-height: 1.28; }
  .bubble ul, .bubble ol { padding-left: 22px; }
  .bubble a { color: var(--cyan); text-decoration-color: rgba(84, 240, 255, .45); }
  .caret {
    display: inline-block;
    width: 8px;
    height: 1.08em;
    background: var(--cyan);
    margin-left: 3px;
    vertical-align: text-bottom;
    box-shadow: 0 0 12px rgba(84, 240, 255, .75);
    animation: blink 1s steps(2) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  footer {
    position: relative;
    z-index: 2;
    flex: 0 0 auto;
    padding: 12px clamp(12px, 3vw, 24px) calc(14px + env(safe-area-inset-bottom));
    background: linear-gradient(to top, rgba(8, 11, 18, .92), rgba(8, 11, 18, .58), transparent);
  }
  .composer {
    width: min(100%, var(--maxw));
    margin: 0 auto;
    display: flex;
    align-items: flex-end;
    gap: 10px;
    padding: 10px;
    border: 1px solid var(--line);
    border-radius: 22px;
    background: var(--panel);
    box-shadow: var(--shadow);
    backdrop-filter: blur(22px);
  }
  .input-shell {
    flex: 1 1 auto;
    min-width: 0;
    position: relative;
  }
  textarea {
    width: 100%;
    resize: none;
    display: block;
    color: var(--text);
    background: transparent;
    border: 0;
    border-radius: 14px;
    padding: 11px 12px;
    max-height: 180px;
    min-height: 46px;
    outline: none;
  }
  textarea::placeholder { color: var(--text-muted); }
  .send {
    width: 46px;
    height: 46px;
    flex: 0 0 46px;
    border-radius: 16px;
    border-color: rgba(84, 240, 255, .45);
    color: #071017;
    font-weight: 800;
    background: linear-gradient(135deg, var(--cyan), var(--green));
    box-shadow: 0 0 26px rgba(84, 240, 255, .22);
    display: grid;
    place-items: center;
  }
  .send svg { width: 20px; height: 20px; }

  @media (max-width: 720px) {
    header { padding: 12px; }
    .status { display: none; }
    .ghost { width: 36px; padding: 0; justify-content: center; }
    .ghost span:not(.plus) { display: none; }
    .thread { padding-top: 24px; gap: 14px; }
    .prompts { grid-template-columns: 1fr; }
    .bubble { max-width: calc(100% - 43px); }
    .empty { margin-top: 46px; }
    .empty .big { font-size: 28px; }
    .composer { border-radius: 18px; padding: 8px; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: .01ms !important;
      animation-iteration-count: 1 !important;
      scroll-behavior: auto !important;
      transition-duration: .01ms !important;
    }
  }
</style>
</head>
<body>
  <header>
    <div class="brand">
      <div class="mark" aria-hidden="true"></div>
      <div class="brand-text">
        <h1>bqagent</h1>
        <span>智能对话中枢</span>
      </div>
    </div>
    <div class="actions">
      <div class="status">在线</div>
      <button class="ghost" id="new-chat" type="button" title="新建对话" aria-label="新建对话">
        <span class="plus" aria-hidden="true">+</span>
        <span>新建</span>
      </button>
    </div>
  </header>
  <main id="main">
    <div class="thread" id="thread">
      <div class="empty" id="empty">
        <div class="empty-mark" aria-hidden="true"></div>
        <div class="big">今天想探索什么？</div>
        <p>bqagent 已就绪，可以帮你拆解问题、写代码、查资料或整理复杂思路。</p>
        <div class="prompts" aria-label="快捷提示">
          <button class="prompt" type="button">帮我梳理这个项目的结构</button>
          <button class="prompt" type="button">把这个想法拆成执行步骤</button>
          <button class="prompt" type="button">检查一段代码里的风险</button>
        </div>
      </div>
    </div>
  </main>
  <footer>
    <div class="composer">
      <div class="input-shell">
        <textarea id="input" rows="1" placeholder="给 bqagent 发送消息" autofocus></textarea>
      </div>
      <button class="send" id="send" type="button" title="发送" aria-label="发送">
        <svg viewBox="0 0 24 24" aria-hidden="true" fill="none">
          <path d="M5 12h13M13 6l6 6-6 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </footer>

<script>
(function () {
  "use strict";
  var SESSION_KEY = "bqagent.webui.session";
  var thread = document.getElementById("thread");
  var main = document.getElementById("main");
  var input = document.getElementById("input");
  var sendBtn = document.getElementById("send");
  var newChatBtn = document.getElementById("new-chat");
  var sessionId = localStorage.getItem(SESSION_KEY) || "";
  var busy = false;

  function scrollToBottom() {
    main.scrollTop = main.scrollHeight;
  }

  function removeEmpty() {
    var empty = document.getElementById("empty");
    if (empty) empty.remove();
  }

  function addMessage(role) {
    removeEmpty();
    var msg = document.createElement("div");
    msg.className = "msg " + role;
    var avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.setAttribute("aria-hidden", "true");
    avatar.textContent = role === "user" ? "你" : "AI";
    var bubble = document.createElement("div");
    bubble.className = "bubble";
    msg.appendChild(avatar);
    msg.appendChild(bubble);
    thread.appendChild(msg);
    scrollToBottom();
    return bubble;
  }

  function emptyMarkup() {
    return '' +
      '<div class="empty" id="empty">' +
      '<div class="empty-mark" aria-hidden="true"></div>' +
      '<div class="big">今天想探索什么？</div>' +
      '<p>bqagent 已就绪，可以帮你拆解问题、写代码、查资料或整理复杂思路。</p>' +
      '<div class="prompts" aria-label="快捷提示">' +
      '<button class="prompt" type="button">帮我梳理这个项目的结构</button>' +
      '<button class="prompt" type="button">把这个想法拆成执行步骤</button>' +
      '<button class="prompt" type="button">检查一段代码里的风险</button>' +
      '</div></div>';
  }

  function escapeHtml(s) {
    return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  function renderInline(s) {
    s = s.replace(/`([^`]+)`/g, function (m, c) { return "<code>" + c + "</code>"; });
    s = s.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
    s = s.replace(/\*([^*\n]+)\*/g, "<em>$1</em>");
    s = s.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g,
      '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
    return s;
  }

  // Minimal, dependency-free Markdown rendering. Everything is HTML-escaped
  // before any markup is added, so model output can never inject HTML.
  function renderMarkdown(text) {
    var blocks = text.split("```");
    var out = "";
    for (var i = 0; i < blocks.length; i++) {
      if (i % 2 === 1) {
        var body = blocks[i].replace(/^[a-zA-Z0-9_+\-.]*\n/, "");
        out += "<pre><code>" + escapeHtml(body) + "</code></pre>";
      } else {
        var lines = escapeHtml(blocks[i]).split("\n");
        var rendered = lines.map(function (line) {
          var h = line.match(/^(#{1,6})\s+(.*)$/);
          if (h) {
            var lvl = h[1].length;
            return "<h" + lvl + ">" + renderInline(h[2]) + "</h" + lvl + ">";
          }
          return renderInline(line);
        }).join("\n");
        out += rendered.replace(/\n/g, "<br>");
      }
    }
    return out;
  }

  function parseSSE(raw) {
    var event = "message";
    var dataLines = [];
    raw.split("\n").forEach(function (line) {
      if (line.indexOf("event:") === 0) {
        event = line.slice(6).trim();
      } else if (line.indexOf("data:") === 0) {
        dataLines.push(line.slice(5).replace(/^ /, ""));
      }
    });
    return { event: event, data: dataLines.join("\n") };
  }

  function setBusy(on) {
    busy = on;
    sendBtn.disabled = on;
    input.disabled = on;
    if (!on) input.focus();
  }

  function autoGrow() {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 180) + "px";
  }

  async function send() {
    if (busy) return;
    var text = input.value.trim();
    if (!text) return;

    addMessage("user").textContent = text;
    input.value = "";
    autoGrow();

    var bubble = addMessage("assistant");
    var caret = document.createElement("span");
    caret.className = "caret";
    bubble.appendChild(caret);
    var streamed = "";

    setBusy(true);
    try {
      var res = await fetch("/api/v1/webui/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text, session_id: sessionId })
      });
      if (!res.ok || !res.body) {
        throw new Error("HTTP " + res.status);
      }

      var reader = res.body.getReader();
      var decoder = new TextDecoder();
      var buffer = "";
      var finished = false;

      while (true) {
        var chunk = await reader.read();
        if (chunk.done) break;
        buffer += decoder.decode(chunk.value, { stream: true });
        var idx;
        while ((idx = buffer.indexOf("\n\n")) >= 0) {
          var rawEvent = buffer.slice(0, idx);
          buffer = buffer.slice(idx + 2);
          if (!rawEvent.trim()) continue;
          var evt = parseSSE(rawEvent);
          if (evt.event === "done") {
            finished = true;
            var done = JSON.parse(evt.data);
            if (done.session_id) {
              sessionId = done.session_id;
              localStorage.setItem(SESSION_KEY, sessionId);
            }
            bubble.classList.add("rendered");
            bubble.innerHTML = renderMarkdown(done.reply || streamed);
          } else if (evt.event === "error") {
            finished = true;
            var errPayload = JSON.parse(evt.data);
            bubble.classList.add("error");
            bubble.textContent = "出错：" + (errPayload.error || "未知错误");
          } else {
            var payload = JSON.parse(evt.data);
            if (payload.delta) {
              streamed += payload.delta;
              caret.remove();
              bubble.textContent = streamed;
              bubble.appendChild(caret);
            }
          }
          scrollToBottom();
        }
      }

      if (!finished) {
        caret.remove();
        bubble.classList.add("rendered");
        bubble.innerHTML = renderMarkdown(streamed) || "<em>（无回复）</em>";
      }
    } catch (err) {
      caret.remove();
      bubble.classList.add("error");
      bubble.textContent = "出错：" + (err && err.message ? err.message : err);
    } finally {
      setBusy(false);
      scrollToBottom();
    }
  }

  function newChat() {
    if (busy) return;
    sessionId = "";
    localStorage.removeItem(SESSION_KEY);
    thread.innerHTML = emptyMarkup();
    input.focus();
  }

  sendBtn.addEventListener("click", send);
  newChatBtn.addEventListener("click", newChat);
  thread.addEventListener("click", function (e) {
    var target = e.target;
    if (target && target.classList && target.classList.contains("prompt")) {
      input.value = target.textContent || "";
      autoGrow();
      input.focus();
    }
  });
  input.addEventListener("input", autoGrow);
  input.addEventListener("keydown", function (e) {
    if (e.key === "Enter" && !e.shiftKey && !e.isComposing) {
      e.preventDefault();
      send();
    }
  });
  autoGrow();
})();
</script>
</body>
</html>
