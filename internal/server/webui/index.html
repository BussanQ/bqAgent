<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>bqagent</title>
<style>
  :root,
  :root[data-theme="dark"] {
    color-scheme: dark;
    --bg: #030711;
    --bg-soft: #071426;
    --panel: rgba(7, 20, 38, .78);
    --panel-strong: rgba(10, 27, 50, .94);
    --header-bg: rgba(3, 7, 17, .86);
    --footer-bg: rgba(3, 7, 17, .96);
    --footer-mid: rgba(3, 7, 17, .60);
    --line: rgba(123, 231, 255, .16);
    --line-strong: rgba(53, 184, 255, .44);
    --text: #eaf7ff;
    --text-soft: #a9c7d9;
    --text-muted: #6f96ae;
    --signal: #35b8ff;
    --stream: #7be7ff;
    --signal-rgb: 53, 184, 255;
    --stream-rgb: 123, 231, 255;
    --progress: #ffc857;
    --progress-rgb: 255, 200, 87;
    --danger: #ff5c75;
    --danger-rgb: 255, 92, 117;
    --shadow: 0 22px 70px rgba(0, 0, 0, .52);
    --code-bg: #020914;
    --quote-bg: rgba(53, 184, 255, .06);
    --table-head: rgba(53, 184, 255, .10);
    --particle-dot: #dff7ff;
    --particle-link: 91, 199, 255;
    --particle-static: rgba(53, 184, 255, .20);
    --radius: 14px;
    --maxw: 1080px;
  }

  @media (prefers-color-scheme: light) {
    :root:not([data-theme]) {
      color-scheme: light;
      --bg: #f3f9ff;
      --bg-soft: #e8f3fc;
      --panel: rgba(255, 255, 255, .84);
      --panel-strong: rgba(255, 255, 255, .97);
      --header-bg: rgba(243, 249, 255, .88);
      --footer-bg: rgba(232, 243, 252, .97);
      --footer-mid: rgba(232, 243, 252, .62);
      --line: rgba(8, 125, 187, .18);
      --line-strong: rgba(8, 125, 187, .40);
      --text: #0a2336;
      --text-soft: #315a72;
      --text-muted: #63859b;
      --signal: #087dbb;
      --stream: #0b789d;
      --signal-rgb: 8, 125, 187;
      --stream-rgb: 11, 120, 157;
      --progress: #a96300;
      --progress-rgb: 169, 99, 0;
      --danger: #c51f43;
      --danger-rgb: 197, 31, 67;
      --shadow: 0 22px 70px rgba(31, 78, 110, .16);
      --code-bg: #edf6fc;
      --quote-bg: rgba(8, 125, 187, .06);
      --table-head: rgba(8, 125, 187, .08);
      --particle-dot: #176f9e;
      --particle-link: 8, 125, 187;
      --particle-static: rgba(8, 125, 187, .14);
    }
  }

  :root[data-theme="light"] {
    color-scheme: light;
    --bg: #f3f9ff;
    --bg-soft: #e8f3fc;
    --panel: rgba(255, 255, 255, .84);
    --panel-strong: rgba(255, 255, 255, .97);
    --header-bg: rgba(243, 249, 255, .88);
    --footer-bg: rgba(232, 243, 252, .97);
    --footer-mid: rgba(232, 243, 252, .62);
    --line: rgba(8, 125, 187, .18);
    --line-strong: rgba(8, 125, 187, .40);
    --text: #0a2336;
    --text-soft: #315a72;
    --text-muted: #63859b;
    --signal: #087dbb;
    --stream: #0b789d;
    --signal-rgb: 8, 125, 187;
    --stream-rgb: 11, 120, 157;
    --progress: #a96300;
    --progress-rgb: 169, 99, 0;
    --danger: #c51f43;
    --danger-rgb: 197, 31, 67;
    --shadow: 0 22px 70px rgba(31, 78, 110, .16);
    --code-bg: #edf6fc;
    --quote-bg: rgba(8, 125, 187, .06);
    --table-head: rgba(8, 125, 187, .08);
    --particle-dot: #176f9e;
    --particle-link: 8, 125, 187;
    --particle-static: rgba(8, 125, 187, .14);
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    min-width: 320px;
    background:
      radial-gradient(circle at 12% -8%, rgba(var(--signal-rgb),.12), transparent 30%),
      radial-gradient(circle at 88% 10%, rgba(var(--stream-rgb),.08), transparent 26%),
      radial-gradient(ellipse at 50% 0%, rgba(var(--signal-rgb),.04), transparent 55%),
      radial-gradient(circle at 50% 50%, transparent 60%, rgba(0, 0, 0, .55) 100%),
      linear-gradient(135deg, var(--bg), var(--bg-soft) 52%, var(--bg));
    color: var(--text);
    font: 15px/1.62 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
      "Segoe UI", "PingFang SC", "Microsoft YaHei", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image:
      linear-gradient(rgba(var(--signal-rgb),.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(var(--signal-rgb),.06) 1px, transparent 1px);
    background-size: 32px 32px;
    mask-image: linear-gradient(to bottom, rgba(0, 0, 0, .55), transparent 72%);
  }

  body::after {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
      linear-gradient(rgba(var(--signal-rgb),.02) 50%, transparent 50%);
    background-size: 100% 4px;
    opacity: .55;
  }

  #particle-field {
    position: fixed;
    inset: 0;
    z-index: 0;
    width: 100%;
    height: 100%;
    display: block;
    pointer-events: none;
  }

  .scanline {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 9999;
    background: linear-gradient(to bottom, transparent, rgba(var(--signal-rgb),.03), transparent);
    background-size: 100% 6px;
    opacity: .35;
    animation: scanline 8s linear infinite;
  }
  @keyframes scanline {
    0% { transform: translateY(-100%); }
    100% { transform: translateY(100%); }
  }

  button, textarea { font: inherit; }
  button {
    cursor: pointer;
    border: 1px solid var(--line);
    color: var(--text);
    background: var(--panel);
    transition: transform .16s ease, border-color .16s ease, background .16s ease, box-shadow .16s ease;
  }
  button:hover {
    transform: translateY(-1px);
    border-color: var(--line-strong);
    box-shadow: 0 12px 32px rgba(var(--signal-rgb),.12);
  }
  button:focus-visible {
    outline: 2px solid var(--signal);
    outline-offset: 2px;
  }
  button:disabled { opacity: .48; cursor: not-allowed; transform: none; box-shadow: none; }

  header {
    position: relative;
    z-index: 2;
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    padding: 14px clamp(14px, 3vw, 28px);
    border-bottom: 1px solid var(--line);
    background: var(--header-bg);
    backdrop-filter: blur(18px);
  }

  .brand { flex: 1 1 auto; display: flex; align-items: center; gap: 12px; min-width: 0; }
  .mark {
    width: 36px;
    height: 36px;
    flex: 0 0 auto;
    border: 1px solid var(--line-strong);
    border-radius: 10px;
    background:
      radial-gradient(circle at 50% 50%, rgba(var(--signal-rgb),.10), transparent 60%),
      var(--panel-strong);
    box-shadow: inset 0 0 18px rgba(var(--signal-rgb),.10), 0 0 26px rgba(var(--signal-rgb),.12);
    position: relative;
  }
  .mark::before,
  .mark::after {
    content: "";
    position: absolute;
  }
  .mark::before {
    inset: 8px;
    border-radius: 50%;
    border: 2px solid rgba(var(--signal-rgb),.55);
    border-right-color: transparent;
    animation: markSpin 4s linear infinite;
  }
  .mark::after {
    width: 7px;
    height: 7px;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: var(--signal);
    box-shadow: 0 0 16px var(--signal);
  }
  @keyframes markSpin { 100% { transform: rotate(360deg); } }
  .brand-text { min-width: 0; }
  .brand h1 {
    margin: 0;
    font-size: 16px;
    line-height: 1.2;
    letter-spacing: .8px;
    font-weight: 700;
    font-family: ui-monospace, "SFMono-Regular", Consolas, "Liberation Mono", monospace;
    text-transform: lowercase;
  }
  .brand span {
    display: block;
    color: var(--text-muted);
    font-size: 12px;
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-family: ui-monospace, "SFMono-Regular", Consolas, "Liberation Mono", monospace;
  }
  .brand span::before {
    content: "> ";
    color: var(--signal);
  }

  .actions { flex: 0 0 auto; display: flex; align-items: center; gap: 10px; }
  .status {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 7px 11px;
    color: var(--text-soft);
    border: 1px solid var(--line);
    border-radius: 999px;
    background: rgba(var(--signal-rgb),.04);
    font-size: 12px;
    white-space: nowrap;
    font-family: ui-monospace, "SFMono-Regular", Consolas, "Liberation Mono", monospace;
  }
  .status::before {
    content: "";
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--signal);
    box-shadow: 0 0 14px var(--signal);
  }
  .status.busy::before {
    background: var(--stream);
    box-shadow: 0 0 14px var(--stream);
    animation: statusPulse 1.15s ease-in-out infinite;
  }
  .status.error::before { background: var(--danger); box-shadow: 0 0 14px var(--danger); }
  @keyframes statusPulse { 50% { opacity: .35; transform: scale(.72); } }
  .ghost {
    height: 36px;
    padding: 0 13px;
    border-radius: 999px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--panel);
  }
  .ghost .plus { font-size: 18px; line-height: 1; color: var(--signal); }
  .icon-button {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: grid;
    place-items: center;
    background: var(--panel);
  }
  .icon-button svg { width: 17px; height: 17px; }

  main {
    position: relative;
    z-index: 1;
    flex: 1 1 auto;
    overflow-y: auto;
    scroll-behavior: smooth;
  }
  .thread {
    width: min(100%, var(--maxw));
    min-height: 100%;
    margin: 0 auto;
    padding: 34px clamp(14px, 3vw, 24px) 18px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .empty {
    width: min(100%, 680px);
    margin: clamp(42px, 12vh, 110px) auto 0;
    text-align: center;
    color: var(--text-soft);
  }
  .empty-mark {
    width: 78px;
    height: 78px;
    margin: 0 auto 22px;
    border-radius: 18px;
    border: 1px solid var(--line-strong);
    background:
      radial-gradient(circle at 50% 50%, rgba(var(--signal-rgb),.14), transparent 55%),
      var(--panel-strong);
    box-shadow: inset 0 0 30px rgba(var(--signal-rgb),.08), 0 0 50px rgba(var(--signal-rgb),.12);
    position: relative;
  }
  .empty-mark::before,
  .empty-mark::after {
    content: "";
    position: absolute;
  }
  .empty-mark::before {
    inset: 14px;
    border-radius: 50%;
    border: 1px solid rgba(var(--signal-rgb),.45);
  }
  .empty-mark::after {
    width: 9px;
    height: 9px;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: var(--signal);
    box-shadow: 0 0 22px var(--signal);
    animation: emptyPulse 2.2s ease-in-out infinite;
  }
  @keyframes emptyPulse { 50% { opacity: .45; transform: translate(-50%, -50%) scale(.8); } }
  .empty .big {
    margin: 0 0 8px;
    color: var(--text);
    font-size: clamp(26px, 4vw, 38px);
    line-height: 1.18;
    font-weight: 780;
  }
  .empty .big .prompt-prefix {
    color: var(--signal);
    margin-right: .1em;
  }
  .empty p {
    margin: 0 auto;
    max-width: 520px;
    color: var(--text-soft);
  }
  .prompts {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 10px;
    margin-top: 24px;
  }
  .prompt {
    min-height: 48px;
    padding: 10px 12px;
    border-radius: var(--radius);
    text-align: left;
    color: var(--text-soft);
    background: var(--panel);
    border: 1px solid var(--line);
    transition: border-color .16s ease, box-shadow .16s ease, transform .16s ease;
  }
  .prompt strong { display: block; color: var(--text); margin-bottom: 2px; font-size: 13px; }
  .prompt span { display: block; font-size: 12px; line-height: 1.45; }
  .prompt:hover {
    color: var(--text);
    border-color: var(--line-strong);
    box-shadow: 0 10px 26px rgba(var(--signal-rgb),.08);
  }

  .empty { animation: emptyEnter .44s cubic-bezier(.22, .8, .28, 1) both; }
  .empty-mark { animation: emptyEnter .40s cubic-bezier(.22, .8, .28, 1) .04s both; }
  .empty .big { animation: emptyEnter .38s cubic-bezier(.22, .8, .28, 1) .09s both; }
  .empty > p { animation: emptyEnter .38s cubic-bezier(.22, .8, .28, 1) .14s both; }
  .prompt { animation: promptEnter .36s cubic-bezier(.22, .8, .28, 1) both; }
  .prompt:nth-child(1) { animation-delay: .18s; }
  .prompt:nth-child(2) { animation-delay: .24s; }
  .prompt:nth-child(3) { animation-delay: .30s; }
  @keyframes emptyEnter {
    from { opacity: 0; transform: translate3d(0, 8px, 0); }
    to { opacity: 1; transform: translate3d(0, 0, 0); }
  }
  @keyframes promptEnter {
    from { opacity: 0; transform: translate3d(0, 6px, 0); }
    to { opacity: 1; transform: translate3d(0, 0, 0); }
  }

  .msg {
    display: flex;
    align-items: flex-start;
    gap: 11px;
  }
  .msg.user {
    flex-direction: row-reverse;
  }
  .msg-enter { animation: messageEnter .22s cubic-bezier(.22, .8, .28, 1) both; }
  .msg.user.msg-enter { animation-name: userMessageEnter; }
  @keyframes messageEnter {
    from { opacity: 0; transform: translate3d(-6px, 5px, 0); }
    to { opacity: 1; transform: translate3d(0, 0, 0); }
  }
  @keyframes userMessageEnter {
    from { opacity: 0; transform: translate3d(6px, 5px, 0); }
    to { opacity: 1; transform: translate3d(0, 0, 0); }
  }
  .message-stack {
    min-width: 0;
    max-width: min(88%, 860px);
    display: flex;
    flex-direction: column;
    align-items: flex-start;
  }
  .msg.user .message-stack { align-items: flex-end; max-width: min(78%, 760px); }
  .message-label {
    color: var(--text-muted);
    font-size: 11px;
    line-height: 1;
    margin: 0 5px 7px;
    letter-spacing: .3px;
    font-family: ui-monospace, "SFMono-Regular", Consolas, "Liberation Mono", monospace;
  }
  .message-label::before {
    color: var(--signal);
    margin-right: .35em;
  }
  .msg.user .message-label::before { content: "[YOU]"; }
  .msg.assistant .message-label::before { content: "[AI]"; }

  .avatar {
    width: 32px;
    height: 32px;
    flex: 0 0 32px;
    border-radius: 10px;
    border: 1px solid var(--line);
    display: grid;
    place-items: center;
    color: var(--text);
    font-size: 11px;
    font-weight: 760;
    background: var(--panel);
    box-shadow: inset 0 0 14px rgba(var(--signal-rgb),.04);
  }
  .msg.assistant .avatar {
    color: var(--bg);
    background: var(--signal);
    box-shadow: 0 0 24px rgba(var(--signal-rgb),.22);
  }
  .msg.user .avatar {
    color: var(--bg);
    background: var(--text-soft);
    box-shadow: 0 0 22px rgba(157, 179, 157, .14);
  }
  .bubble {
    width: fit-content;
    max-width: 100%;
    padding: 13px 15px;
    border-radius: var(--radius);
    white-space: pre-wrap;
    word-wrap: break-word;
    overflow-wrap: anywhere;
    border: 1px solid var(--line);
    box-shadow: 0 14px 34px rgba(0, 0, 0, .20);
    position: relative;
  }
  .msg.user .bubble {
    color: var(--text);
    border-color: var(--line-strong);
    border-top-right-radius: 5px;
    background: var(--panel-strong);
  }
  .msg.user .bubble::after {
    content: "";
    position: absolute;
    inset: 0 0 0 auto;
    width: 3px;
    border-radius: 0 var(--radius) var(--radius) 0;
    background: var(--signal);
    opacity: .8;
  }
  .msg.assistant .bubble {
    color: var(--text);
    border-top-left-radius: 5px;
    background: var(--panel-strong);
  }
  .msg.assistant .bubble::after {
    content: "";
    position: absolute;
    inset: 0 auto 0 0;
    width: 3px;
    border-radius: var(--radius) 0 0 var(--radius);
    background: var(--signal);
    opacity: .8;
  }
  .msg.assistant .bubble.is-streaming::after {
    background: var(--stream);
    transform-origin: center;
    animation: streamSignal 1.8s ease-in-out infinite;
  }
  @keyframes streamSignal {
    0%, 100% { opacity: .34; transform: scaleY(.28); }
    50% { opacity: 1; transform: scaleY(.92); }
  }
  .bubble.error {
    color: var(--danger);
    background: rgba(255, 92, 117, .07);
    border-color: rgba(255, 92, 117, .55);
  }
  .bubble.error::after { background: var(--danger); }
  .bubble.notice {
    color: var(--text);
    background: rgba(255, 200, 87, .07);
    border-color: rgba(255, 200, 87, .45);
  }
  .bubble.notice::after { background: var(--progress); }
  .bubble.rendered { white-space: normal; }
  .bubble.rendered { width: 100%; padding: 18px 20px; }
  .bubble.rendered > :first-child { margin-top: 0; }
  .bubble.rendered > :last-child { margin-bottom: 0; }
  .bubble p { margin: .72em 0; }
  .bubble .code-block {
    background: var(--code-bg);
    border: 1px solid var(--line);
    border-radius: 10px;
    overflow: hidden;
    margin: 14px 0;
  }
  .code-head {
    min-height: 34px;
    padding: 6px 9px 6px 13px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    color: var(--signal);
    border-bottom: 1px solid var(--line);
    background: rgba(var(--signal-rgb),.06);
    font: 11px/1.2 ui-monospace, "SFMono-Regular", Consolas, monospace;
    text-transform: lowercase;
  }
  .copy-code, .mini-action {
    color: var(--text-soft);
    background: var(--panel);
    border-radius: 7px;
    padding: 4px 8px;
    font-size: 11px;
  }
  .copy-code:hover, .mini-action:hover {
    color: var(--text);
    border-color: var(--line-strong);
    background: rgba(var(--signal-rgb),.10);
  }
  .bubble pre {
    background: transparent;
    border: 0;
    border-radius: 0;
    padding: 14px 16px 16px;
    overflow-x: auto;
    margin: 0;
    tab-size: 2;
  }
  .bubble code {
    font-family: ui-monospace, "SFMono-Regular", Consolas, "Liberation Mono", monospace;
    font-size: 13px;
  }
  .bubble :not(pre) > code {
    background: rgba(var(--signal-rgb),.10);
    border: 1px solid rgba(var(--signal-rgb),.14);
    padding: 1px 6px;
    border-radius: 6px;
    color: var(--signal);
  }
  .bubble pre code { display: block; color: var(--text); }
  .bubble h1, .bubble h2, .bubble h3, .bubble h4, .bubble h5, .bubble h6 {
    margin: 1.15em 0 .48em;
    line-height: 1.3;
    letter-spacing: -.012em;
    color: var(--text);
  }
  .bubble h1 { font-size: 1.56em; padding-bottom: .38em; border-bottom: 1px solid var(--line); }
  .bubble h2 { font-size: 1.32em; padding-bottom: .3em; border-bottom: 1px solid var(--line); }
  .bubble h3 { font-size: 1.16em; }
  .bubble h4, .bubble h5, .bubble h6 { font-size: 1em; }
  .bubble ul, .bubble ol { padding-left: 1.55em; margin: .72em 0; }
  .bubble li { margin: .3em 0; }
  .bubble li > p { margin: .28em 0; }
  .bubble .task-list { list-style: none; padding-left: .3em; }
  .bubble .task-list input { margin: 0 .55em 0 0; accent-color: var(--signal); }
  .bubble a { color: var(--stream); text-decoration-color: rgba(var(--stream-rgb),.45); }
  .bubble a:hover { text-decoration-thickness: 2px; color: var(--signal); }
  .bubble .md-image {
    display: block;
    max-width: 100%;
    max-height: 560px;
    margin: 1em auto;
    border: 1px solid var(--line);
    border-radius: 10px;
    object-fit: contain;
    background: rgba(0, 0, 0, .08);
  }
  .bubble blockquote {
    margin: 1em 0;
    padding: .35em 1em;
    color: var(--text-soft);
    background: var(--quote-bg);
    border-left: 3px solid var(--signal);
    border-radius: 0 10px 10px 0;
  }
  .bubble hr { height: 1px; border: 0; background: var(--line); margin: 1.4em 0; }
  .table-wrap { width: 100%; overflow-x: auto; margin: 1em 0; border: 1px solid var(--line); border-radius: 10px; }
  .bubble table { width: 100%; min-width: 440px; border-collapse: collapse; font-size: 13px; }
  .bubble th, .bubble td { padding: 9px 12px; border-bottom: 1px solid var(--line); border-right: 1px solid var(--line); text-align: left; vertical-align: top; }
  .bubble th { color: var(--text); background: var(--table-head); font-weight: 700; }
  .bubble tr:last-child td { border-bottom: 0; }
  .bubble th:last-child, .bubble td:last-child { border-right: 0; }
  .tool-timeline {
    width: 100%;
    margin: 0 0 8px;
    display: grid;
    gap: 7px;
  }
  .tool-card {
    overflow: hidden;
    border: 1px solid var(--line);
    border-radius: 10px;
    background: rgba(var(--signal-rgb),.035);
    font-family: ui-monospace, "SFMono-Regular", Consolas, "Liberation Mono", monospace;
  }
  .tool-card.failed { border-color: rgba(var(--danger-rgb),.42); }
  .tool-card.succeeded { border-color: rgba(var(--signal-rgb),.28); }
  .tool-toggle {
    width: 100%;
    min-height: 36px;
    padding: 7px 10px;
    border: 0;
    border-radius: 0;
    display: flex;
    align-items: center;
    gap: 8px;
    text-align: left;
    background: transparent;
    box-shadow: none;
  }
  .tool-toggle:hover { transform: none; box-shadow: none; background: rgba(var(--signal-rgb),.055); }
  .tool-chevron { color: var(--signal); transition: transform .16s ease; }
  .tool-toggle[aria-expanded="true"] .tool-chevron { transform: rotate(90deg); }
  .tool-state-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--stream); box-shadow: 0 0 10px rgba(var(--stream-rgb),.55); }
  .tool-card.succeeded .tool-state-dot { background: var(--signal); }
  .tool-card.failed .tool-state-dot { background: var(--danger); box-shadow: 0 0 10px rgba(var(--danger-rgb),.45); }
  .tool-name { color: var(--text); font-size: 12px; font-weight: 700; }
  .tool-status { margin-left: auto; color: var(--text-muted); font-size: 10px; }
  .tool-details { display: none; border-top: 1px solid var(--line); padding: 9px 11px 11px; }
  .tool-details.open { display: block; }
  .tool-section + .tool-section { margin-top: 8px; }
  .tool-section-label { color: var(--text-muted); font-size: 10px; margin-bottom: 4px; text-transform: uppercase; }
  .tool-json, .tool-preview { margin: 0; color: var(--text-soft); white-space: pre-wrap; overflow-wrap: anywhere; max-height: 240px; overflow: auto; font-size: 11px; line-height: 1.5; }
  .user-message-text + .user-images { margin-top: 10px; }
  .user-images { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 180px)); gap: 8px; }
  .user-image { display: block; width: 100%; max-height: 220px; object-fit: cover; border-radius: 9px; border: 1px solid rgba(255,255,255,.2); background: rgba(0,0,0,.12); }

  .message-actions {
    min-height: 28px;
    margin: 7px 4px 0;
    display: flex;
    align-items: center;
    gap: 6px;
    opacity: .25;
    transition: opacity .16s ease;
  }
  .msg:hover .message-actions, .message-actions:focus-within { opacity: 1; }
  .message-actions .mini-action { padding: 3px 7px; border-color: transparent; }
  .feedback-note { color: var(--text-muted); font-size: 11px; }
  .caret {
    display: inline-block;
    width: 9px;
    height: 1.15em;
    background: var(--stream);
    margin-left: 3px;
    vertical-align: text-bottom;
    box-shadow: 0 0 14px rgba(var(--stream-rgb),.75);
    animation: blink 1s steps(2) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  footer {
    position: relative;
    z-index: 2;
    flex: 0 0 auto;
    padding: 12px clamp(12px, 3vw, 24px) calc(14px + env(safe-area-inset-bottom));
    background: linear-gradient(to top, var(--footer-bg), var(--footer-mid), transparent);
  }
  .composer {
    width: min(100%, var(--maxw));
    margin: 0 auto;
    display: flex;
    align-items: flex-end;
    gap: 10px;
    padding: 10px;
    border: 1px solid var(--line-strong);
    border-radius: 18px;
    background: var(--panel);
    box-shadow: var(--shadow);
    backdrop-filter: blur(22px);
    position: relative;
    transition: border-color .2s ease, box-shadow .2s ease, background .2s ease;
  }
  .composer:focus-within {
    border-color: var(--signal);
    background: var(--panel-strong);
    box-shadow: var(--shadow), 0 0 0 1px rgba(var(--signal-rgb),.08), 0 0 30px rgba(var(--signal-rgb),.10);
  }
  .composer-content { flex: 1 1 auto; min-width: 0; display: flex; flex-direction: column; gap: 8px; }
  .attachment-tray[hidden] { display: none; }
  .attachment-tray { display: flex; flex-wrap: wrap; gap: 8px; padding: 2px 8px 0 30px; }
  .attachment-item { position: relative; width: 68px; height: 58px; border: 1px solid var(--line); border-radius: 9px; overflow: hidden; background: var(--panel-strong); }
  .attachment-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .attachment-item.loading img { opacity: .45; }
  .attachment-remove { position: absolute; top: 3px; right: 3px; width: 20px; height: 20px; padding: 0; border-radius: 50%; display: grid; place-items: center; color: #fff; background: rgba(var(--danger-rgb),.86); border-color: transparent; font-size: 13px; line-height: 1; }
  .attachment-remove:hover { transform: none; box-shadow: 0 0 14px rgba(var(--danger-rgb),.35); }
  .attachment-badge { position: absolute; left: 3px; bottom: 3px; padding: 1px 4px; border-radius: 4px; color: #fff; background: rgba(3,7,17,.72); font: 9px/1.4 ui-monospace, monospace; }
  .attachment-error { color: var(--danger); font-size: 11px; padding: 0 10px 0 30px; }
  .composer::before {
    content: ">";
    position: absolute;
    left: 20px;
    bottom: 24px;
    color: var(--signal);
    font-family: ui-monospace, "SFMono-Regular", Consolas, "Liberation Mono", monospace;
    font-size: 15px;
    font-weight: 700;
    pointer-events: none;
    opacity: .9;
  }
  .composer-meta {
    width: min(100%, var(--maxw));
    margin: 7px auto 0;
    color: var(--text-muted);
    font-size: 11px;
    text-align: center;
    font-family: ui-monospace, "SFMono-Regular", Consolas, "Liberation Mono", monospace;
  }
  .composer-meta::before { content: "> "; color: var(--signal); }
  .input-shell {
    flex: 1 1 auto;
    min-width: 0;
    position: relative;
    padding-left: 22px;
  }
  textarea {
    width: 100%;
    resize: none;
    display: block;
    color: var(--text);
    background: transparent;
    border: 0;
    border-radius: 14px;
    padding: 11px 12px;
    max-height: 180px;
    min-height: 46px;
    outline: none;
  }
  textarea::placeholder { color: var(--text-muted); }
  .send {
    width: 46px;
    height: 46px;
    flex: 0 0 46px;
    border-radius: 14px;
    border-color: rgba(var(--signal-rgb),.45);
    color: var(--bg);
    font-weight: 800;
    background: var(--signal);
    box-shadow: 0 0 26px rgba(var(--signal-rgb),.22);
    display: grid;
    place-items: center;
  }
  .send:hover {
    border-color: var(--signal);
    box-shadow: 0 0 36px rgba(var(--signal-rgb),.32);
  }
  .send svg { width: 20px; height: 20px; }
  .send .stop-icon { display: none; }
  .send.stop {
    color: #fff;
    border-color: rgba(255, 92, 117, .62);
    background: var(--danger);
    box-shadow: 0 0 28px rgba(255, 92, 117, .28);
  }
  .send.stop:hover { border-color: var(--danger); box-shadow: 0 0 36px rgba(255, 92, 117, .36); }
  .send.stop .send-icon { display: none; }
  .send.stop .stop-icon { display: block; }

  @media (max-width: 720px) {
    header { padding: 12px; }
    .brand span { display: none; }
    .status { display: none; }
    .ghost { width: 36px; padding: 0; justify-content: center; }
    .ghost span:not(.plus) { display: none; }
    .thread { padding-top: 24px; gap: 14px; }
    .prompts { grid-template-columns: 1fr; }
    .message-stack, .msg.user .message-stack { max-width: calc(100% - 43px); }
    .bubble.rendered { padding: 15px 16px; }
    .message-label { display: none; }
    .empty { margin-top: 46px; }
    .empty .big { font-size: 28px; }
    .composer { border-radius: 16px; padding: 8px; }
    .composer::before { left: 16px; font-size: 14px; }
    .input-shell { padding-left: 18px; }
    .composer-meta { display: none; }
    #particle-field { display: none; }
  }

  @media (hover: none), (pointer: coarse) {
    #particle-field { display: none; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: .01ms !important;
      animation-iteration-count: 1 !important;
      scroll-behavior: auto !important;
      transition-duration: .01ms !important;
    }
    .empty, .empty-mark, .empty .big, .empty > p, .prompt,
    .msg-enter, .msg.user.msg-enter, .bubble.is-streaming::after {
      animation: none !important;
    }
  }
</style>
</head>
<body>
  <canvas id="particle-field" aria-hidden="true"></canvas>
  <div class="scanline" aria-hidden="true"></div>
  <header>
    <div class="brand">
      <div class="mark" aria-hidden="true"></div>
      <div class="brand-text">
        <h1>bqagent</h1>
        <span id="runtime-model">Workspace intelligence</span>
      </div>
    </div>
    <div class="actions">
      <div class="status" id="status" role="status" aria-live="polite" aria-atomic="true">在线</div>
      <button class="icon-button" id="theme-toggle" type="button" title="切换主题" aria-label="切换明暗主题">
        <svg viewBox="0 0 24 24" aria-hidden="true" fill="none">
          <path d="M12 3v2m0 14v2M3 12h2m14 0h2M5.64 5.64l1.42 1.42m9.88 9.88 1.42 1.42m0-12.72-1.42 1.42M7.06 16.94l-1.42 1.42" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="1.8"/>
        </svg>
      </button>
      <button class="ghost" id="new-chat" type="button" title="新建对话" aria-label="新建对话">
        <span class="plus" aria-hidden="true">+</span>
        <span>新建</span>
      </button>
    </div>
  </header>
  <main id="main">
    <div class="thread" id="thread">
      <div class="empty" id="empty">
        <div class="empty-mark" aria-hidden="true"></div>
        <div class="big"><span class="prompt-prefix">&gt;</span>今天想探索什么？</div>
        <p>bqagent 已就绪，可以帮你拆解问题、写代码、查资料或整理复杂思路。</p>
        <div class="prompts" aria-label="快捷提示">
          <button class="prompt" type="button"><strong>理解项目</strong><span>帮我梳理这个项目的结构</span></button>
          <button class="prompt" type="button"><strong>制定计划</strong><span>把这个想法拆成执行步骤</span></button>
          <button class="prompt" type="button"><strong>审查代码</strong><span>检查一段代码里的风险</span></button>
        </div>
      </div>
    </div>
  </main>
  <footer>
    <div class="composer">
      <div class="composer-content">
        <div class="attachment-tray" id="attachment-tray" aria-label="待发送图片" hidden></div>
        <div class="attachment-error" id="attachment-error" role="status" aria-live="polite"></div>
        <div class="input-shell">
          <textarea id="input" rows="1" placeholder="给 bqagent 发送消息，可直接粘贴图片" autofocus></textarea>
        </div>
      </div>
      <button class="send" id="send" type="button" title="发送" aria-label="发送">
        <svg class="send-icon" viewBox="0 0 24 24" aria-hidden="true" fill="none">
          <path d="M5 12h13M13 6l6 6-6 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <svg class="stop-icon" viewBox="0 0 24 24" aria-hidden="true" fill="none">
          <rect x="7" y="7" width="10" height="10" rx="2" fill="currentColor"/>
        </svg>
      </button>
    </div>
    <div class="composer-meta">Enter 发送 · Shift + Enter 换行 · 支持 Markdown · 可粘贴图片</div>
  </footer>

<script>
(function () {
  "use strict";
  var SESSION_KEY = "bqagent.webui.session";
  var THEME_KEY = "bqagent.webui.theme";
  var thread = document.getElementById("thread");
  var main = document.getElementById("main");
  var particleCanvas = document.getElementById("particle-field");
  var input = document.getElementById("input");
  var attachmentTray = document.getElementById("attachment-tray");
  var attachmentError = document.getElementById("attachment-error");
  var sendBtn = document.getElementById("send");
  var newChatBtn = document.getElementById("new-chat");
  var themeToggle = document.getElementById("theme-toggle");
  var statusEl = document.getElementById("status");
  var runtimeModelEl = document.getElementById("runtime-model");
  var sessionId = localStorage.getItem(SESSION_KEY) || "";
  var busy = false;
  var currentTurnId = "";
  var currentController = null;
  var stopRequested = false;
  var preparingSend = false;
  var pendingImages = [];
  var pendingImageReads = [];
  var nextAttachmentID = 1;
  var MAX_PENDING_IMAGES = 4;
  var MAX_PENDING_IMAGE_BYTES = 3 * 1024 * 1024;
  var MAX_PENDING_TOTAL_BYTES = 8 * 1024 * 1024;
  var ALLOWED_IMAGE_TYPES = { "image/png": true, "image/jpeg": true, "image/gif": true };

  var PARTICLE_MAX_COUNT = 80;
  var PARTICLE_TARGET_FPS = 30;
  var PARTICLE_FRAME_INTERVAL = 1000 / PARTICLE_TARGET_FPS;
  var PARTICLE_LINK_DISTANCE = 100;
  var PARTICLE_MOUSE_RADIUS = 140;
  var particleContext = null;
  var particles = [];
  var particleBuckets = Object.create(null);
  var particleWidth = 0;
  var particleHeight = 0;
  var particleDpr = 1;
  var particleFrame = 0;
  var particleResizeFrame = 0;
  var particleLastFrameTime = 0;
  var particleRunning = false;
  var particlePalette = { dot: "#dff7ff", link: "91, 199, 255", staticDot: "rgba(53, 184, 255, .20)" };
  var particleMouse = { x: 0, y: 0, active: false };
  var finePointerQuery = window.matchMedia ? window.matchMedia("(hover: hover) and (pointer: fine)") : null;
  var reducedMotionQuery = window.matchMedia ? window.matchMedia("(prefers-reduced-motion: reduce)") : null;

  function listenMediaQuery(query, handler) {
    if (!query) return;
    if (typeof query.addEventListener === "function") query.addEventListener("change", handler);
    else if (typeof query.addListener === "function") query.addListener(handler);
  }

  function randomBetween(min, max) {
    return min + Math.random() * (max - min);
  }

  function refreshParticlePalette() {
    if (!particleCanvas) return;
    var styles = getComputedStyle(document.documentElement);
    particlePalette.dot = styles.getPropertyValue("--particle-dot").trim() || "#dff7ff";
    particlePalette.link = styles.getPropertyValue("--particle-link").trim() || "91, 199, 255";
    particlePalette.staticDot = styles.getPropertyValue("--particle-static").trim() || "rgba(53, 184, 255, .20)";
  }

  function targetParticleCount() {
    return Math.min(PARTICLE_MAX_COUNT, Math.max(36, Math.min(72,
      Math.round((particleWidth * particleHeight) / 12000))));
  }

  function createParticle() {
    var angle = Math.random() * Math.PI * 2;
    var speed = randomBetween(7, 18);
    var vx = Math.cos(angle) * speed;
    var vy = Math.sin(angle) * speed;
    return {
      x: Math.random() * particleWidth,
      y: Math.random() * particleHeight,
      vx: vx,
      vy: vy,
      baseVx: vx,
      baseVy: vy,
      radius: randomBetween(1, 1.8)
    };
  }

  function syncParticleCount() {
    var target = targetParticleCount();
    while (particles.length < target) particles.push(createParticle());
    if (particles.length > target) particles.length = target;
  }

  function resizeParticleField() {
    if (!particleCanvas || !particleContext) return;
    var previousWidth = particleWidth || window.innerWidth;
    var previousHeight = particleHeight || window.innerHeight;
    particleWidth = Math.max(1, window.innerWidth);
    particleHeight = Math.max(1, window.innerHeight);
    particleDpr = Math.min(window.devicePixelRatio || 1, 1.5);
    particleCanvas.width = Math.max(1, Math.floor(particleWidth * particleDpr));
    particleCanvas.height = Math.max(1, Math.floor(particleHeight * particleDpr));
    particleContext.setTransform(particleDpr, 0, 0, particleDpr, 0, 0);
    particles.forEach(function (particle) {
      particle.x = particle.x / previousWidth * particleWidth;
      particle.y = particle.y / previousHeight * particleHeight;
    });
    syncParticleCount();
    drawParticleField(0, false);
  }

  function buildParticleBuckets() {
    particleBuckets = Object.create(null);
    particles.forEach(function (particle, index) {
      var cellX = Math.floor(particle.x / PARTICLE_LINK_DISTANCE);
      var cellY = Math.floor(particle.y / PARTICLE_LINK_DISTANCE);
      var key = cellX + ":" + cellY;
      if (!particleBuckets[key]) particleBuckets[key] = [];
      particleBuckets[key].push(index);
    });
  }

  function updateParticle(particle, dt) {
    particle.vx += (particle.baseVx - particle.vx) * Math.min(1, dt * .7);
    particle.vy += (particle.baseVy - particle.vy) * Math.min(1, dt * .7);
    if (particleMouse.active) {
      var dx = particleMouse.x - particle.x;
      var dy = particleMouse.y - particle.y;
      var distanceSquared = dx * dx + dy * dy;
      if (distanceSquared > 1 && distanceSquared < PARTICLE_MOUSE_RADIUS * PARTICLE_MOUSE_RADIUS) {
        var distance = Math.sqrt(distanceSquared);
        var force = (1 - distance / PARTICLE_MOUSE_RADIUS) * 18;
        particle.vx += dx / distance * force * dt;
        particle.vy += dy / distance * force * dt;
      }
    }
    var speed = Math.sqrt(particle.vx * particle.vx + particle.vy * particle.vy);
    if (speed > 28) {
      particle.vx = particle.vx / speed * 28;
      particle.vy = particle.vy / speed * 28;
    }
    particle.x += particle.vx * dt;
    particle.y += particle.vy * dt;
    if (particle.x < -2) particle.x = particleWidth + 2;
    else if (particle.x > particleWidth + 2) particle.x = -2;
    if (particle.y < -2) particle.y = particleHeight + 2;
    else if (particle.y > particleHeight + 2) particle.y = -2;
  }

  function drawParticleLinks() {
    var maxDistanceSquared = PARTICLE_LINK_DISTANCE * PARTICLE_LINK_DISTANCE;
    particles.forEach(function (particle, index) {
      var cellX = Math.floor(particle.x / PARTICLE_LINK_DISTANCE);
      var cellY = Math.floor(particle.y / PARTICLE_LINK_DISTANCE);
      for (var offsetY = -1; offsetY <= 1; offsetY++) {
        for (var offsetX = -1; offsetX <= 1; offsetX++) {
          var bucket = particleBuckets[(cellX + offsetX) + ":" + (cellY + offsetY)] || [];
          bucket.forEach(function (otherIndex) {
            if (otherIndex <= index) return;
            var other = particles[otherIndex];
            var dx = other.x - particle.x;
            var dy = other.y - particle.y;
            var distanceSquared = dx * dx + dy * dy;
            if (distanceSquared >= maxDistanceSquared) return;
            var alpha = (1 - distanceSquared / maxDistanceSquared) * .20;
            particleContext.beginPath();
            particleContext.moveTo(particle.x, particle.y);
            particleContext.lineTo(other.x, other.y);
            particleContext.strokeStyle = "rgba(" + particlePalette.link + "," + alpha + ")";
            particleContext.lineWidth = .65;
            particleContext.stroke();
          });
        }
      }
    });
  }

  function drawParticleField(dt, animate) {
    if (!particleContext || !particleWidth || !particleHeight) return;
    particleContext.clearRect(0, 0, particleWidth, particleHeight);
    if (animate) particles.forEach(function (particle) { updateParticle(particle, dt); });
    if (animate) {
      buildParticleBuckets();
      drawParticleLinks();
      particleContext.fillStyle = particlePalette.dot;
    } else {
      particleContext.fillStyle = particlePalette.staticDot;
    }
    particles.forEach(function (particle) {
      particleContext.beginPath();
      particleContext.arc(particle.x, particle.y, particle.radius, 0, Math.PI * 2);
      particleContext.fill();
    });
  }

  function particleAnimationLoop(timestamp) {
    if (!particleRunning) return;
    particleFrame = requestAnimationFrame(particleAnimationLoop);
    if (particleLastFrameTime && timestamp - particleLastFrameTime < PARTICLE_FRAME_INTERVAL) return;
    var dt = particleLastFrameTime ? Math.min((timestamp - particleLastFrameTime) / 1000, .05) : 1 / PARTICLE_TARGET_FPS;
    particleLastFrameTime = timestamp;
    drawParticleField(dt, true);
  }

  function startParticleField() {
    if (particleRunning || !particleContext) return;
    particleRunning = true;
    particleLastFrameTime = 0;
    particleFrame = requestAnimationFrame(particleAnimationLoop);
  }

  function stopParticleField(clear) {
    particleRunning = false;
    particleLastFrameTime = 0;
    if (particleFrame) cancelAnimationFrame(particleFrame);
    particleFrame = 0;
    particleMouse.active = false;
    if (clear && particleContext) particleContext.clearRect(0, 0, particleWidth, particleHeight);
  }

  function canAnimateParticleField() {
    return !!particleContext && !!finePointerQuery && finePointerQuery.matches &&
      !(reducedMotionQuery && reducedMotionQuery.matches) && window.innerWidth > 720 && !document.hidden;
  }

  function refreshParticleCapability() {
    if (!particleContext) return;
    if (canAnimateParticleField()) {
      startParticleField();
      return;
    }
    stopParticleField(true);
    if (!document.hidden && window.innerWidth > 720 &&
        reducedMotionQuery && reducedMotionQuery.matches) drawParticleField(0, false);
  }

  function scheduleParticleResize() {
    if (particleResizeFrame) cancelAnimationFrame(particleResizeFrame);
    particleResizeFrame = requestAnimationFrame(function () {
      particleResizeFrame = 0;
      resizeParticleField();
      refreshParticleCapability();
    });
  }

  function handleParticlePointerMove(event) {
    if (!particleRunning || event.pointerType !== "mouse") return;
    particleMouse.x = event.clientX;
    particleMouse.y = event.clientY;
    particleMouse.active = true;
  }

  function clearParticlePointer() {
    particleMouse.active = false;
  }

  function initParticleField() {
    if (!particleCanvas || typeof particleCanvas.getContext !== "function") return;
    particleContext = particleCanvas.getContext("2d");
    if (!particleContext) return;
    refreshParticlePalette();
    resizeParticleField();
    window.addEventListener("pointermove", handleParticlePointerMove, { passive: true });
    window.addEventListener("pointerout", function (event) {
      if (!event.relatedTarget) clearParticlePointer();
    });
    window.addEventListener("blur", clearParticlePointer);
    window.addEventListener("resize", scheduleParticleResize, { passive: true });
    document.addEventListener("visibilitychange", refreshParticleCapability);
    listenMediaQuery(finePointerQuery, refreshParticleCapability);
    listenMediaQuery(reducedMotionQuery, refreshParticleCapability);
    refreshParticleCapability();
  }

  async function loadRuntimeModel() {
    try {
      var response = await fetch("/api/v1/status", { headers: { "Accept": "application/json" } });
      if (!response.ok) return;
      var payload = await response.json();
      if (!payload || !payload.llm || !payload.llm.model) return;
      var apiType = payload.llm.api_type || "llm";
      runtimeModelEl.textContent = apiType + " · " + payload.llm.model;
      runtimeModelEl.title = "Current runtime model";
    } catch (_) {
      // Status display is best-effort and must never block chat startup.
    }
  }

  function scrollToBottom() {
    main.scrollTop = main.scrollHeight;
  }

  function removeEmpty() {
    var empty = document.getElementById("empty");
    if (empty) empty.remove();
  }

  function addMessage(role) {
    removeEmpty();
    var msg = document.createElement("div");
    msg.className = "msg " + role + " msg-enter";
    var avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.setAttribute("aria-hidden", "true");
    avatar.textContent = role === "user" ? "你" : "AI";
    var stack = document.createElement("div");
    stack.className = "message-stack";
    var label = document.createElement("div");

  function removePendingImage(id) {
    if (busy) return;
    pendingImages = pendingImages.filter(function (image) {
      if (image.id !== id) return true;
      URL.revokeObjectURL(image.objectURL);
      return false;
    });
    renderPendingImages();
  }

  function clearPendingImages() {
    pendingImages.forEach(function (image) { URL.revokeObjectURL(image.objectURL); });
    pendingImages = [];
    pendingImageReads = [];
    renderPendingImages();
    clearAttachmentError();
  }

  function readImageAsBase64(file, attachment) {
    return new Promise(function (resolve, reject) {
      var reader = new FileReader();
      reader.onload = function () {
        var dataURL = String(reader.result || "");
        var comma = dataURL.indexOf(",");
        if (comma < 0) return reject(new Error("无法读取图片数据"));
        attachment.dataBase64 = dataURL.slice(comma + 1);
        attachment.loading = false;
        renderPendingImages();
        resolve();
      };
      reader.onerror = function () { reject(new Error("读取图片失败")); };
      reader.readAsDataURL(file);
    });
  }

  function addClipboardImages(files) {
    clearAttachmentError();
    var totalBytes = pendingImages.reduce(function (sum, image) { return sum + image.size; }, 0);
    files.forEach(function (file) {
      if (pendingImages.length >= MAX_PENDING_IMAGES) return setAttachmentError("每次最多发送 " + MAX_PENDING_IMAGES + " 张图片");
      if (!ALLOWED_IMAGE_TYPES[file.type]) return setAttachmentError("仅支持 PNG、JPEG 和 GIF 图片");
      if (file.size > MAX_PENDING_IMAGE_BYTES) return setAttachmentError("单张图片不能超过 3 MiB");
      if (totalBytes + file.size > MAX_PENDING_TOTAL_BYTES) return setAttachmentError("图片总大小不能超过 8 MiB");
      totalBytes += file.size;
      var attachment = { id: nextAttachmentID++, mimeType: file.type, size: file.size, dataBase64: "", objectURL: URL.createObjectURL(file), loading: true };
      pendingImages.push(attachment);
      var read = readImageAsBase64(file, attachment).catch(function (error) {
        setAttachmentError(error.message || String(error));
        removePendingImage(attachment.id);
        throw error;
      });
      pendingImageReads.push(read);
    });
    renderPendingImages();
  }

  function escapeHtml(s) {
    return String(s == null ? "" : s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  function safeHref(url) {
    var value = String(url || "").trim();
    if (/^(https?:|mailto:)/i.test(value) || /^(#|\/(?!\/)|\.\/|\.\.\/)/.test(value)) {
      return value;
    }
    return "";
  }

  function applyEmphasis(s) {
    return s
      .replace(/~~([^~]+)~~/g, "<del>$1</del>")
      .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
      .replace(/__([^_]+)__/g, "<strong>$1</strong>")
      .replace(/(^|[^*])\*([^*\n]+)\*/g, "$1<em>$2</em>")
      .replace(/(^|[^_])_([^_\n]+)_/g, "$1<em>$2</em>");
  }

  function renderInline(source) {
    var tokens = [];
    function stash(html) {
      var token = "\u0000MD" + tokens.length + "\u0000";
      tokens.push(html);
      return token;
    }

    var text = String(source == null ? "" : source);
    text = text.replace(/(`+)([\s\S]*?)\1/g, function (_, ticks, code) {
      return stash("<code>" + escapeHtml(code.trim()) + "</code>");
    });
    text = text.replace(/!\[([^\]]*)\]\(([^\s)]+)(?:\s+["']([^"']*)["'])?\)/g,
      function (_, alt, url, title) {
        var src = safeHref(url);
        if (!src || /^mailto:/i.test(src) || /^#/i.test(src)) return alt;
        return stash('<img class="md-image" src="' + escapeHtml(src) + '" alt="' + escapeHtml(alt) + '"' +
          (title ? ' title="' + escapeHtml(title) + '"' : "") + ' loading="lazy" referrerpolicy="no-referrer">');
      });
    text = text.replace(/\[([^\]]+)\]\(([^\s)]+)(?:\s+["']([^"']*)["'])?\)/g,
      function (_, label, url, title) {
        var href = safeHref(url);
        if (!href) return label + " (" + url + ")";
        var titleAttr = title ? ' title="' + escapeHtml(title) + '"' : "";
        var external = /^https?:/i.test(href) ? ' target="_blank" rel="noopener noreferrer"' : "";
        return stash('<a href="' + escapeHtml(href) + '"' + titleAttr + external + '>' +
          applyEmphasis(escapeHtml(label)) + "</a>");
      });
    text = text.replace(/(^|[\s(])(https?:\/\/[^\s<]+)/g, function (_, prefix, url) {
      var clean = url.replace(/[.,;:!?]+$/, "");
      var tail = url.slice(clean.length);
      return prefix + stash('<a href="' + escapeHtml(clean) + '" target="_blank" rel="noopener noreferrer">' +
        escapeHtml(clean) + "</a>") + tail;
    });
    text = applyEmphasis(escapeHtml(text));
    return text.replace(/\u0000MD(\d+)\u0000/g, function (_, index) {
      return tokens[Number(index)] || "";
    });
  }

  function isFence(line) {
    return line.match(/^\s*(`{3,}|~{3,})\s*([a-zA-Z0-9_+.-]*)\s*$/);
  }

  function isHorizontalRule(line) {
    return /^\s{0,3}((\*\s*){3,}|(-\s*){3,}|(_\s*){3,})\s*$/.test(line);
  }

  function isListLine(line) {
    return line.match(/^\s{0,3}([-+*]|\d+[.)])\s+(.+)$/);
  }

  function splitTableRow(line) {
    var value = line.trim();
    if (value.charAt(0) === "|") value = value.slice(1);
    if (value.charAt(value.length - 1) === "|") value = value.slice(0, -1);
    var cells = [];
    var current = "";
    var escaped = false;
    for (var i = 0; i < value.length; i++) {
      var ch = value.charAt(i);
      if (escaped) {
        current += ch;
        escaped = false;
      } else if (ch === "\\") {
        escaped = true;
      } else if (ch === "|") {
        cells.push(current.trim());
        current = "";
      } else {
        current += ch;
      }
    }
    cells.push(current.trim());
    return cells;
  }

  function tableDelimiter(line) {
    var cells = splitTableRow(line);
    if (!cells.length) return null;
    var aligns = [];
    for (var i = 0; i < cells.length; i++) {
      var cell = cells[i].replace(/\s/g, "");
      if (!/^:?-{3,}:?$/.test(cell)) return null;
      aligns.push(cell.charAt(0) === ":" && cell.charAt(cell.length - 1) === ":" ? "center" :
        (cell.charAt(cell.length - 1) === ":" ? "right" : "left"));
    }
    return aligns;
  }

  function codeBlock(language, body) {
    var label = language || "code";
    return '<div class="code-block"><div class="code-head"><span>' + escapeHtml(label) +
      '</span><button class="copy-code" type="button">复制</button></div><pre><code' +
      (language ? ' class="language-' + escapeHtml(language) + '"' : "") + ">" +
      escapeHtml(body.replace(/\n$/, "")) + "</code></pre></div>";
  }

  function renderParagraph(lines) {
    var parts = [];
    for (var i = 0; i < lines.length; i++) {
      var hardBreak = /\s{2}$/.test(lines[i]);
      parts.push(renderInline(lines[i].replace(/\s+$/, "")) + (hardBreak ? "<br>" : " "));
    }
    return "<p>" + parts.join("").trim() + "</p>";
  }

  function beginsBlock(lines, index) {
    var line = lines[index] || "";
    if (!line.trim() || isFence(line) || /^(#{1,6})\s+/.test(line) || /^\s*>/.test(line) ||
        isHorizontalRule(line) || isListLine(line)) return true;
    return index + 1 < lines.length && line.indexOf("|") >= 0 && !!tableDelimiter(lines[index + 1]);
  }

  // Dependency-free safe Markdown renderer. Raw HTML is always escaped. It
  // covers the constructs commonly found in README and generated .md files.
  function renderMarkdown(source) {
    var lines = String(source == null ? "" : source).replace(/\r\n?/g, "\n").split("\n");
    var html = [];
    var i = 0;
    while (i < lines.length) {
      var line = lines[i];
      if (!line.trim()) { i++; continue; }

      var fence = isFence(line);
      if (fence) {
        var marker = fence[1];
        var language = fence[2] || "";
        var code = [];
        i++;
        while (i < lines.length && !(new RegExp("^\\s*" + marker.charAt(0) + "{" + marker.length + ",}\\s*$")).test(lines[i])) {
          code.push(lines[i++]);
        }
        if (i < lines.length) i++;
        html.push(codeBlock(language, code.join("\n")));
        continue;
      }

      if (i + 1 < lines.length && /^\s*(=+|-+)\s*$/.test(lines[i + 1]) && lines[i + 1].trim().length >= 3) {
        var setextLevel = lines[i + 1].trim().charAt(0) === "=" ? 1 : 2;
        html.push("<h" + setextLevel + ">" + renderInline(line.trim()) + "</h" + setextLevel + ">");
        i += 2;
        continue;
      }

      var heading = line.match(/^(#{1,6})\s+(.+?)\s*#*$/);
      if (heading) {
        var level = heading[1].length;
        html.push("<h" + level + ">" + renderInline(heading[2]) + "</h" + level + ">");
        i++;
        continue;
      }

      if (isHorizontalRule(line)) {
        html.push("<hr>");
        i++;
        continue;
      }

      if (/^\s*>/.test(line)) {
        var quoted = [];
        while (i < lines.length && (/^\s*>/.test(lines[i]) || !lines[i].trim())) {
          quoted.push(lines[i].replace(/^\s*>\s?/, ""));
          i++;
        }
        html.push("<blockquote>" + renderMarkdown(quoted.join("\n")) + "</blockquote>");
        continue;
      }

      if (i + 1 < lines.length && line.indexOf("|") >= 0) {
        var aligns = tableDelimiter(lines[i + 1]);
        if (aligns) {
          var headers = splitTableRow(line);
          var rows = [];
          i += 2;
          while (i < lines.length && lines[i].trim() && lines[i].indexOf("|") >= 0) {
            rows.push(splitTableRow(lines[i++]));
          }
          var table = '<div class="table-wrap"><table><thead><tr>';
          headers.forEach(function (cell, column) {
            table += '<th style="text-align:' + (aligns[column] || "left") + '">' + renderInline(cell) + "</th>";
          });
          table += "</tr></thead><tbody>";
          rows.forEach(function (row) {
            table += "<tr>";
            headers.forEach(function (_, column) {
              table += '<td style="text-align:' + (aligns[column] || "left") + '">' + renderInline(row[column] || "") + "</td>";
            });
            table += "</tr>";
          });
          html.push(table + "</tbody></table></div>");
          continue;
        }
      }

      var list = isListLine(line);
      if (list) {
        var ordered = /^\d/.test(list[1]);
        var tag = ordered ? "ol" : "ul";
        var items = [];
        var hasTasks = false;
        while (i < lines.length) {
          var item = isListLine(lines[i]);
          if (!item || /^\d/.test(item[1]) !== ordered) break;
          var body = item[2];
          var task = body.match(/^\[([ xX])\]\s+(.*)$/);
          if (task) {
            hasTasks = true;
            body = '<input type="checkbox" disabled' + (task[1].toLowerCase() === "x" ? " checked" : "") + ">" + renderInline(task[2]);
          } else {
            body = renderInline(body);
          }
          items.push("<li>" + body + "</li>");
          i++;
        }
        html.push("<" + tag + (hasTasks ? ' class="task-list"' : "") + ">" + items.join("") + "</" + tag + ">");
        continue;
      }

      var paragraph = [line];
      i++;
      while (i < lines.length && !beginsBlock(lines, i)) {
        paragraph.push(lines[i++]);
      }
      html.push(renderParagraph(paragraph));
    }
    return html.join("");
  }

  function complexTaskNotice(text) {
    var match = String(text || "").match(/^Agent stopped: reached maximum of (\d+) iterations without completing\.$/);
    if (!match) return "";
    return [
      "复杂任务还没有完成。",
      "",
      "本轮已触达失控保险上限（" + match[1] + " 次迭代）。默认已开启自动压缩续跑，正常很难碰到这个上限；你可以继续发送“继续”，我会沿当前会话接着处理。如确实需要更长的单轮，可在 `.env` 中调大 `AGENT_MAX_ITERATIONS` 后重启服务。"
    ].join("\n");
  }

  function renderReply(bubble, reply) {
    var notice = complexTaskNotice(reply);

  }

  function parseSSE(raw) {
    var event = "message";

    raw.split("\n").forEach(function (line) {
      if (line.indexOf("event:") === 0) {

      } else if (line.indexOf("data:") === 0) {
        dataLines.push(line.slice(5).replace(/^ /, ""));
      }
    });
    return { event: event, data: dataLines.join("\n") };
  }

  function copyText(text) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      return navigator.clipboard.writeText(text);
    }
    return new Promise(function (resolve, reject) {
      var helper = document.createElement("textarea");
      helper.value = text;
      helper.style.position = "fixed";
      helper.style.opacity = "0";
      document.body.appendChild(helper);
      helper.select();
      try {
        document.execCommand("copy") ? resolve() : reject(new Error("copy failed"));
      } catch (error) {
        reject(error);
      } finally {
        helper.remove();
      }
    });
  }

  function addMessageControls(bubble, runId, reply) {

  function createTurnId() {
    if (window.crypto && typeof window.crypto.randomUUID === "function") {
      return window.crypto.randomUUID();
    }
    var random = Math.random().toString(36).slice(2);
    return "turn-" + Date.now().toString(36) + "-" + random;
  }

  async function stopCurrentTurn() {
    if (!busy || !currentTurnId || stopRequested) return;
    stopRequested = true;
    sendBtn.disabled = true;
    statusEl.textContent = "正在停止";
    try {
      var response = await fetch("/api/v1/chat/stop", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ turn_id: currentTurnId })
      });
      if (!response.ok) throw new Error("HTTP " + response.status);
      var result = await response.json();
      if (!result.stopped && currentController) currentController.abort();
    } catch (_) {
      if (currentController) currentController.abort();
    }
  }

  async function send() {
    if (busy || preparingSend) return;
    preparingSend = true;
    try {
      await Promise.all(pendingImageReads);
      pendingImageReads = [];
    } catch (_) {
      pendingImageReads = [];
      preparingSend = false;
      return;
    }
    var text = input.value.trim();
    var sentImages = pendingImages.filter(function (image) { return !image.loading && image.dataBase64; }).map(function (image) {
      return { mime_type: image.mimeType, data_base64: image.dataBase64 };
    });
    if (!text && !sentImages.length) {
      preparingSend = false;
      return;
    }

    currentTurnId = createTurnId();
    currentController = new AbortController();
    stopRequested = false;

    renderUserMessage(addMessage("user"), text, sentImages);
    input.value = "";
    autoGrow();

    var bubble = addMessage("assistant");
    var toolCards = {};
    preparingSend = false;
    bubble.classList.add("is-streaming");
    var caret = document.createElement("span");
    caret.className = "caret";
    bubble.appendChild(caret);
    var streamed = "";
    var progress = "";

    setBusy(true);
    try {
      var res = await fetch("/api/v1/webui/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text, images: sentImages, session_id: sessionId, turn_id: currentTurnId }),
        signal: currentController.signal
      });
      if (!res.ok || !res.body) {
        var errorText = "";
        try { errorText = await res.text(); } catch (_) {}
        throw new Error("HTTP " + res.status + (errorText ? ": " + errorText : ""));
      }
      clearPendingImages();

      var reader = res.body.getReader();
      var decoder = new TextDecoder();
      var buffer = "";
      var finished = false;

      while (true) {
        var chunk = await reader.read();
        if (chunk.done) break;
        buffer += decoder.decode(chunk.value, { stream: true });
        var idx;
        while ((idx = buffer.indexOf("\n\n")) >= 0) {
          var rawEvent = buffer.slice(0, idx);
          buffer = buffer.slice(idx + 2);
          if (!rawEvent.trim()) continue;
          var evt = parseSSE(rawEvent);
          if (evt.event === "tool_start" || evt.event === "tool_result") {
            updateToolTimeline(bubble, toolCards, evt.event, JSON.parse(evt.data));
          } else if (evt.event === "done") {
            finished = true;
            clearStreamingState(bubble);
            var done = JSON.parse(evt.data);
            if (done.session_id) {
              sessionId = done.session_id;
              localStorage.setItem(SESSION_KEY, sessionId);
            }
            bubble.classList.add("rendered");
            var finalReply = done.reply || streamed;
            renderReply(bubble, finalReply);
            addMessageControls(bubble, done.run_id, finalReply);
          } else if (evt.event === "stopped") {
            finished = true;
            clearStreamingState(bubble);
            caret.remove();
            bubble.classList.add("rendered", "notice");
            var stoppedReply = streamed ? streamed + "\n\n> 已停止生成。" : "已停止生成。";
            renderReply(bubble, stoppedReply);
            addMessageControls(bubble, "", streamed);
            statusEl.textContent = "已停止";
            statusEl.classList.remove("busy", "error");
          } else if (evt.event === "error") {
            finished = true;
            clearStreamingState(bubble);
            var errPayload = JSON.parse(evt.data);
            bubble.classList.add("error");
            bubble.textContent = "出错：" + (errPayload.error || "未知错误");
            statusEl.textContent = "请求失败";
            statusEl.classList.remove("busy");
            statusEl.classList.add("error");
          } else if (evt.event === "progress") {
            var progressPayload = JSON.parse(evt.data);
            if (progressPayload.message && !streamed) {
              progress = progressPayload.message;
              caret.remove();
              bubble.classList.add("notice");
              bubble.textContent = progress;
              bubble.appendChild(caret);
            }
          } else {
            var payload = JSON.parse(evt.data);
            if (payload.delta) {
              streamed += payload.delta;
              caret.remove();
              bubble.classList.remove("notice");
              bubble.textContent = streamed;
              bubble.appendChild(caret);
            }
          }
          scrollToBottom();
        }
      }

      if (!finished) {
        clearStreamingState(bubble);
        caret.remove();
        bubble.classList.add("rendered");
        if (streamed) {
          renderReply(bubble, streamed);
          addMessageControls(bubble, "", streamed);
        } else {
          bubble.innerHTML = "<em>（无回复）</em>";
        }
      }
    } catch (err) {
      clearStreamingState(bubble);
      caret.remove();
      if (stopRequested || (err && err.name === "AbortError")) {
        bubble.classList.add("rendered", "notice");
        var partialReply = streamed ? streamed + "\n\n> 已停止生成。" : "已停止生成。";
        renderReply(bubble, partialReply);
        addMessageControls(bubble, "", streamed);
      } else {
        bubble.classList.add("error");
        bubble.textContent = "出错：" + (err && err.message ? err.message : err);
        statusEl.textContent = "连接失败";
        statusEl.classList.remove("busy");
        statusEl.classList.add("error");
      }
    } finally {
      clearStreamingState(bubble);
      setBusy(false);
      currentTurnId = "";
      currentController = null;
      stopRequested = false;
      scrollToBottom();
    }
  }

  function newChat() {
    if (busy) return;
    sessionId = "";
    localStorage.removeItem(SESSION_KEY);
    clearPendingImages();
    thread.innerHTML = emptyMarkup();
    statusEl.textContent = "在线";
    statusEl.classList.remove("error", "busy");
    input.focus();
  }

  sendBtn.addEventListener("click", function () {
    if (busy) stopCurrentTurn(); else send();
  });
  newChatBtn.addEventListener("click", newChat);
  themeToggle.addEventListener("click", function () {
    var current = document.documentElement.getAttribute("data-theme") || "dark";
    setTheme(current === "dark" ? "light" : "dark");
  });
  thread.addEventListener("click", function (e) {
    var target = e.target;
    var copyButton = target && target.closest ? target.closest(".copy-code") : null;
    if (copyButton) {
      var code = copyButton.closest(".code-block").querySelector("code");
      copyText(code ? code.textContent : "").then(function () {
        copyButton.textContent = "已复制";
        setTimeout(function () { copyButton.textContent = "复制"; }, 1200);
      });
      return;
    }
    var prompt = target && target.closest ? target.closest(".prompt") : null;
    if (prompt) {
      var detail = prompt.querySelector("span");
      input.value = detail ? detail.textContent : (prompt.textContent || "");
      autoGrow();
      input.focus();
    }
  });
  input.addEventListener("input", autoGrow);
  input.addEventListener("paste", function (event) {
    if (busy || !event.clipboardData || !event.clipboardData.items) return;
    var files = [];
    Array.prototype.forEach.call(event.clipboardData.items, function (item) {
      if (item.kind === "file" && item.type.indexOf("image/") === 0) {
        var file = item.getAsFile();
        if (file) files.push(file);
      }
    });
    if (!files.length) return;
    event.preventDefault();
    var pastedText = event.clipboardData.getData("text/plain");
    if (pastedText) {
      input.setRangeText(pastedText, input.selectionStart, input.selectionEnd, "end");
      autoGrow();
    }
    addClipboardImages(files);
  });
  input.addEventListener("keydown", function (e) {
    if (e.key === "Enter" && !e.shiftKey && !e.isComposing) {
      e.preventDefault();
      send();
    }
  });
  window.addEventListener("beforeunload", function () {
    pendingImages.forEach(function (image) { URL.revokeObjectURL(image.objectURL); });
  });
  setTheme(localStorage.getItem(THEME_KEY) ||
    (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark"));
  initParticleField();
  loadRuntimeModel();
  autoGrow();
})();
</script>
</body>
</html>
